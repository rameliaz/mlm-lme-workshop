          - text: "Evaluasi Workshop"
            href: https://www.soscisurvey.de/invited-talk-feedback/
      - icon: envelope
        href: "mailto:amelia.zein@psikologi.unair.ac.id"
      - icon: github
        href: https://github.com/rameliaz
      - icon: discord
