      - href: https://rameliaz.github.io/
        icon: house
        text: "oleh Rizqy Amelia Zein"
      - icon: github
        href: https://github.com/rameliaz/mlm-lme-workshop
    right:
      - text: "Salindia"
        menu:
          - text: "Bagian 1"
            href: materi-lme1.html
          - text: "Bagian 2"
            href: materi-lme2.html
